name: release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Convert data assets
        shell: pwsh
        run: .\build\Convert-DataToJson.ps1

      - name: Publish NativeAOT single exe
        run: dotnet publish src/Taskctl.Cli -c Release -o build/publish

      - name: Package zip
        shell: pwsh
        run: |
          $zip = "build/taskctl-$env:GITHUB_REF_NAME-win-x64.zip"
          Compress-Archive -Path build/publish/taskctl.exe -DestinationPath $zip -Force
          "ASSET=$zip" | Add-Content $env:GITHUB_ENV

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME $env:ASSET --title $env:GITHUB_REF_NAME --generate-notes
