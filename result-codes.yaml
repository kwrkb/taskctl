# taskctl / result-codes.yaml
# 結果コード翻訳表（doctor の中核データ資産）
#
# 各エントリは「これは何 / 原因 / 次の一手[ランク]」の3点セット。
# コードの意味は記憶で埋めず、Microsoft Learn の一次資料で検証済みのものだけを載せる。
# 未確定の汎用コードは fallback（net helpmsg）に回し、断定しない。
#
# 出典:
#   - Task Scheduler error and success constants
#     https://learn.microsoft.com/windows/win32/taskschd/task-scheduler-error-and-success-constants
#   - COM Error Codes (XACT, SCHED, OLE)
#     https://learn.microsoft.com/windows/win32/com/com-error-codes-2
#   - Troubleshoot issues with scheduled tasks not running
#     https://learn.microsoft.com/troubleshoot/windows-server/system-management-components/troubleshoot-scheduled-tasks-not-running
#   - Scheduled task can't run an .exe file on a share folder
#     https://learn.microsoft.com/troubleshoot/windows-client/system-management-components/scheduled-task-cannot-run
#   - "Access Denied" error when using Task Scheduler
#     https://learn.microsoft.com/troubleshoot/windows-server/system-management-components/troubleshooting-task-scheduler-access-denied-error

meta:
  # LastTaskResult は符号付き 32bit int で返る。lookup 前に必ず uint32 hex へ正規化する:
    #   - 負の10進（例 -2147024891） + 0x100000000 して uint32 化
      #   - 正の10進 / "0x..." 表記  そのまま uint32
        # 正規化後の hex（大文字8桁0x 付き）を key とする。
          normalize: "signed-int32 -> uint32 hex (8桁)"
          
            # ランク（次の一手の性格。severity と対応）
              ranks:
                  情報: この結果は失敗ではない。状態を伝えるだけ。
                      判断: 仕様の可能性。意図通りか本人にしか決められない。問いを返す。
                          調査: 断定できない。真因を掴むための情報収集コマンドを提示する。
                              修正: 原因がほぼ確定。コピペできる標準コマンドを提示する（実行はユーザー）。
                              
                                # kind（コードの種類。混同を解くのが doctor の主目的）
                                  kinds:
                                      status: タスクスケジューラの状態コード（SCHED_S_*）。多くは失敗ではない。
                                          sched_error: タスクスケジューラのエラー（SCHED_E_*）。
                                              system: Windows システム/HRESULT エラー。
                                                  app: 実行プログラム自身の終了コード。
                                                  
                                                  # 調査でよく使う定型コマンド（entry から参照）。実行はユーザーに委ねる。
                                                  snippets:
                                                    operational_log: |
                                                        Get-WinEvent -LogName Microsoft-Windows-TaskScheduler/Operational |
                                                              Where-Object { $_.Message -match "<TASKNAME>" } | Select-Object -First 10
                                                                test_action_standalone: |
                                                                    # 操作(Action)のコマンドを、タスクを介さず手元で直接実行して切り分ける
                                                                      isolate_security_context: |
                                                                          # 切り分け: 一時的に「ユーザーがログオンしているときのみ実行」へ変えて再実行し、
                                                                              # セキュリティ文脈の問題かを確認する（確認後は元に戻す）
                                                                              
                                                                              codes:
                                                                              
                                                                                # ---- 成功 ----
                                                                                  - key: "0x00000000"
                                                                                      dec: 0
                                                                                          constant: S_OK
                                                                                              kind: app
                                                                                                  is_failure: false
                                                                                                      severity: ok
                                                                                                          meaning: 正常終了。直近の実行は成功した。
                                                                                                              next:
                                                                                                                    rank: 情報
                                                                                                                          text: 対応不要。
                                                                                                                          
                                                                                                                            # ---- 状態コード SCHED_S_* (0x000413xx) : 失敗ではない ----
                                                                                                                              - key: "0x00041300"
                                                                                                                                  dec: 267008
                                                                                                                                      constant: SCHED_S_TASK_READY
                                                                                                                                          kind: status
                                                                                                                                              is_failure: false
                                                                                                                                                  severity: info
                                                                                                                                                      meaning: 次回のスケジュール時刻に実行できる「準備完了」状態。プロセスの終了コードではない。
                                                                                                                                                          next: { rank: 情報, text: 対応不要。 }
                                                                                                                                                          
                                                                                                                                                            - key: "0x00041301"
                                                                                                                                                                dec: 267009
                                                                                                                                                                    constant: SCHED_S_TASK_RUNNING
                                                                                                                                                                        kind: status
                                                                                                                                                                            is_failure: false
                                                                                                                                                                                severity: info
                                                                                                                                                                                    meaning: 現在実行中という状態コード。失敗ではない。
                                                                                                                                                                                        next:
                                                                                                                                                                                              rank: 判断
                                                                                                                                                                                                    text: |
                                                                                                                                                                                                            長時間 Running のままなら、操作のプロセスが終了していない可能性。
                                                                                                                                                                                                                    該当プロセスをタスクマネージャ等で確認する。
                                                                                                                                                                                                                            参考ログ: {{snippets.operational_log}}
                                                                                                                                                                                                                            
                                                                                                                                                                                                                              - key: "0x00041302"
                                                                                                                                                                                                                                  dec: 267010
                                                                                                                                                                                                                                      constant: SCHED_S_TASK_DISABLED
                                                                                                                                                                                                                                          kind: status
                                                                                                                                                                                                                                              is_failure: false
                                                                                                                                                                                                                                                  severity: notice
                                                                                                                                                                                                                                                      meaning: 無効化されているため、スケジュール時刻には実行されない。
                                                                                                                                                                                                                                                          next:
                                                                                                                                                                                                                                                                rank: 判断
                                                                                                                                                                                                                                                                      text: |
                                                                                                                                                                                                                                                                              無効化が意図通りか確認。動かしたいなら:
                                                                                                                                                                                                                                                                                        Enable-ScheduledTask -TaskName "<TASKNAME>"
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                          - key: "0x00041303"
                                                                                                                                                                                                                                                                                              dec: 267011
                                                                                                                                                                                                                                                                                                  constant: SCHED_S_TASK_HAS_NOT_RUN
                                                                                                                                                                                                                                                                                                      kind: status
                                                                                                                                                                                                                                                                                                          is_failure: false
                                                                                                                                                                                                                                                                                                              severity: info
                                                                                                                                                                                                                                                                                                                  meaning: まだ一度も実行されていない、という状態コード。失敗ではない。
                                                                                                                                                                                                                                                                                                                      next:
                                                                                                                                                                                                                                                                                                                            rank: 判断
                                                                                                                                                                                                                                                                                                                                  text: 登録直後なら正常。実行されるはずなのに残るなら、トリガーと有効/無効を確認。
                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                    - key: "0x00041304"
                                                                                                                                                                                                                                                                                                                                        dec: 267012
                                                                                                                                                                                                                                                                                                                                            constant: SCHED_S_TASK_NO_MORE_RUNS
                                                                                                                                                                                                                                                                                                                                                kind: status
                                                                                                                                                                                                                                                                                                                                                    is_failure: false
                                                                                                                                                                                                                                                                                                                                                        severity: info
                                                                                                                                                                                                                                                                                                                                                            meaning: このタスクに、これ以上のスケジュール実行は残っていない。
                                                                                                                                                                                                                                                                                                                                                                next: { rank: 判断, text: トリガーの終了境界が過ぎていないか確認。 }
                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                  - key: "0x00041305"
                                                                                                                                                                                                                                                                                                                                                                      dec: 267013
                                                                                                                                                                                                                                                                                                                                                                          constant: SCHED_S_TASK_NOT_SCHEDULED
                                                                                                                                                                                                                                                                                                                                                                              kind: status
                                                                                                                                                                                                                                                                                                                                                                                  is_failure: false
                                                                                                                                                                                                                                                                                                                                                                                      severity: warning
                                                                                                                                                                                                                                                                                                                                                                                          meaning: スケジュール実行に必要なプロパティが設定されていない。
                                                                                                                                                                                                                                                                                                                                                                                              next:
                                                                                                                                                                                                                                                                                                                                                                                                    rank: 調査
                                                                                                                                                                                                                                                                                                                                                                                                          text: トリガーが設定されているか、有効かを確認する。
                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                            - key: "0x00041306"
                                                                                                                                                                                                                                                                                                                                                                                                                dec: 267014
                                                                                                                                                                                                                                                                                                                                                                                                                    constant: SCHED_S_TASK_TERMINATED
                                                                                                                                                                                                                                                                                                                                                                                                                        kind: status
                                                                                                                                                                                                                                                                                                                                                                                                                            is_failure: false
                                                                                                                                                                                                                                                                                                                                                                                                                                severity: warning
                                                                                                                                                                                                                                                                                                                                                                                                                                    meaning: 直近の実行が「ユーザーによって終了された」。強制終了実行時間制限超過も含みうる。
                                                                                                                                                                                                                                                                                                                                                                                                                                        next:
                                                                                                                                                                                                                                                                                                                                                                                                                                              rank: 調査
                                                                                                                                                                                                                                                                                                                                                                                                                                                    text: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                            手動停止でないなら「実行時間の制限」超過で強制終了された可能性。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    制限値と実際の実行時間を確認する。真因はログで:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              {{snippets.operational_log}}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - key: "0x00041307"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    dec: 267015
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        constant: SCHED_S_TASK_NO_VALID_TRIGGERS
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            kind: status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                is_failure: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    severity: warning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        meaning: トリガーが無いか、既存のトリガーが無効/未設定。自動では起動しない。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            next: { rank: 調査, text: トリガーの有無と有効状態を確認する。 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - key: "0x00041308"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  dec: 267016
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      constant: SCHED_S_EVENT_TRIGGER
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          kind: status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              is_failure: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  severity: info
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      meaning: イベントトリガーには固定の実行時刻が無い、という情報。失敗ではない。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          next: { rank: 情報, text: 対応不要。 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - key: "0x0004131B"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                dec: 267035
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    constant: SCHED_S_SOME_TRIGGERS_FAILED
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        kind: status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            is_failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                severity: warning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    meaning: 登録はされたが、一部のトリガーはタスクを起動しない。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        next:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              rank: 調査
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            どのトリガーが無効かをイベントログで確認:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      {{snippets.operational_log}}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - key: "0x0004131C"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            dec: 267036
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                constant: SCHED_S_BATCH_LOGON_PROBLEM
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    kind: status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        is_failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            severity: warning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                meaning: 登録はされたが起動に失敗しうる。プリンシパルに「バッチ ログオン」権限が必要。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    next:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          rank: 修正
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                text: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        実行ユーザーに「バッチ ジョブとしてログオン」権限を付与する
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                （ローカル セキュリティ ポリシー > ローカル ポリシー > ユーザー権利の割り当て）。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - key: "0x00041325"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      dec: 267045
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          constant: SCHED_S_TASK_QUEUED
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              kind: status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  is_failure: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      severity: info
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          meaning: サービスがタスクに実行を要求した（キュー済み）状態。失敗ではない。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              next: { rank: 情報, text: 対応不要。 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ---- スケジューラエラー SCHED_E_* (0x800413xx) ----
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - key: "0x80041309"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      constant: SCHED_E_TRIGGER_NOT_FOUND
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          kind: sched_error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              is_failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  severity: error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      meaning: トリガーが見つからない。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          next: { rank: 調査, text: タスク定義のトリガーを確認再設定する。 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - key: "0x8004130A"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                constant: SCHED_E_TASK_NOT_READY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    kind: sched_error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        is_failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            severity: error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                meaning: 実行に必要なプロパティが未設定。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    next: { rank: 調査, text: 操作プリンシパル等、必須項目の欠落を確認する。 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - key: "0x8004130C"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          constant: SCHED_E_SERVICE_NOT_INSTALLED
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              kind: sched_error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  is_failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      severity: error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          meaning: このコンピューターに Task Scheduler サービスがインストールされていない。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              next: { rank: 調査, text: システムの状態を確認（通常は環境側の異常）。 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - key: "0x8004130D"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    constant: SCHED_E_CANNOT_OPEN_TASK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        kind: sched_error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            is_failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                severity: error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    meaning: タスクオブジェクトを開けない。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        next: { rank: 調査, text: 権限、またはタスク定義の破損を確認する。 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - key: "0x8004130E"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              constant: SCHED_E_INVALID_TASK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  kind: sched_error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      is_failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          severity: error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              meaning: 無効なタスクオブジェクト、またはタスクオブジェクトではない。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  next: { rank: 調査, text: 対象の指定が正しいか確認する。 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - key: "0x8004130F"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        constant: SCHED_E_ACCOUNT_INFORMATION_NOT_SET
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            kind: sched_error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                is_failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    severity: error
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        meaning: セキュリティ データベースに、このタスクの実行アカウント情報が見つからない。資格情報未設定。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            next:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  rank: 修正
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        text: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                実行ユーザーと資格情報を設定し直して再登録する（パスワード入力が必要）:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Register-ScheduledTask ... -User "<USER>" -Password "<...>"   # 対話入力推奨
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  切り分け: {{snippets.isolate_security_context}}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - key: "0x80041310"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        constant: SCHED_E_ACCOUNT_NAME_NOT_FOUND
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            kind: sched_error
