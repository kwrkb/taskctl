# taskctl / data/messages/ja.yaml
# 日本語メッセージカタログ。人間向けプロースのみを置く。
# 事実（constant / kind / severity / is_failure / rank）は registry.yaml 側。
# ルール: コマンド・定数名・コード値・機械識別子は翻訳しない。
# キー集合は registry.yaml と一致させる（coverage テストで担保）。
#
# 各エントリは VISION の3点セットに対応する:
#   meaning : これは何（状態コードか終了コードかを区別して説明）
#   cause   : 考えられる原因（断定せず候補を示す。is_failure のコードには必須）
#   next    : 次の一手（rank は registry 側。コマンドは提示のみで実行しない）

locale: ja

# rank の表示ラベルと説明
ranks:
  info:
    label: 情報
    description: この結果は失敗ではない。状態を伝えるだけ。
  decide:
    label: 判断
    description: 仕様の可能性。意図通りか本人にしか決められない。問いを返す。
  investigate:
    label: 調査
    description: 断定できない。真因を掴むための情報収集コマンドを提示する。
  fix:
    label: 修正
    description: 原因がほぼ確定。コピペできる標準コマンドを提示する（実行はユーザー）。

# kind の表示ラベルと説明
kinds:
  status:
    label: 状態コード
    description: タスクスケジューラの状態コード（SCHED_S_*）。多くは失敗ではない。
  sched_error:
    label: スケジューラエラー
    description: タスクスケジューラのエラー（SCHED_E_*）。
  system:
    label: システムエラー
    description: Windows システム/HRESULT エラー。
  app:
    label: アプリ終了コード
    description: 実行プログラム自身の終了コード。

# 見出し（レンダラが使う。VISION の3点セット）
headings:
  meaning: これは何
  cause: 考えられる原因
  next: 次の一手

# 調査でよく使う定型テキスト（メッセージから {{snippets.*}} で参照）。
# コマンド行は非翻訳（en と同一）。コメント行のみローカライズする。
snippets:
  operational_log: |
    Get-WinEvent -LogName Microsoft-Windows-TaskScheduler/Operational |
      Where-Object { $_.Message -match '{{task_regex}}' } | Select-Object -First 10
  test_action_standalone: |
    # 操作(Action)のコマンドを、タスクを介さず手元で直接実行して切り分ける
    {{command}}
  isolate_security_context: |
    # 切り分け: 一時的に「ユーザーがログオンしているときのみ実行」へ変えて再実行し、
    # セキュリティ文脈の問題かを確認する（確認後は元に戻す）

codes:
  "0x00000000":
    meaning: 正常終了。直近の実行は成功した。
    next: 対応不要。

  "0x00041300":
    meaning: 次回のスケジュール時刻に実行できる「準備完了」状態。プロセスの終了コードではない。
    next: 対応不要。

  "0x00041301":
    meaning: 現在実行中という状態コード。失敗ではない。
    next: |
      長時間 Running のままなら、操作のプロセスが終了していない可能性。
      該当プロセスをタスクマネージャ等で確認する。
      参考ログ: {{snippets.operational_log}}

  "0x00041302":
    meaning: 無効化されているため、スケジュール時刻には実行されない。
    next: |
      無効化が意図通りか確認。動かしたいなら:
        Enable-ScheduledTask {{task_args}}

  "0x00041303":
    meaning: まだ一度も実行されていない、という状態コード。失敗ではない。
    next: 登録直後なら正常。実行されるはずなのに残るなら、トリガーと有効/無効を確認。

  "0x00041304":
    meaning: このタスクに、これ以上のスケジュール実行は残っていない。
    next: トリガーの終了境界が過ぎていないか確認。

  "0x00041305":
    meaning: スケジュール実行に必要なプロパティが設定されていない。
    next: トリガーが設定されているか、有効かを確認する。

  "0x00041306":
    meaning: 直近の実行が「ユーザーによって終了された」。強制終了実行時間制限超過も含みうる。
    next: |
      手動停止でないなら「実行時間の制限」超過で強制終了された可能性。
      制限値と実際の実行時間を確認する。真因はログで:
        {{snippets.operational_log}}

  "0x00041307":
    meaning: トリガーが無いか、既存のトリガーが無効/未設定。自動では起動しない。
    next: トリガーの有無と有効状態を確認する。

  "0x00041308":
    meaning: イベントトリガーには固定の実行時刻が無い、という情報。失敗ではない。
    next: 対応不要。

  "0x0004131B":
    meaning: 登録はされたが、一部のトリガーはタスクを起動しない。
    cause: 一部のトリガーの設定が不正か、この環境では成立しない条件になっている可能性。
    next: |
      どのトリガーが無効かをイベントログで確認:
        {{snippets.operational_log}}

  "0x0004131C":
    meaning: 登録はされたが起動に失敗しうる。プリンシパルに「バッチ ログオン」権限が必要。
    cause: 実行ユーザーに「バッチ ジョブとしてログオン」権限が付与されていない可能性。
    next: |
      実行ユーザーに「バッチ ジョブとしてログオン」権限を付与する
      （ローカル セキュリティ ポリシー > ローカル ポリシー > ユーザー権利の割り当て）。

  "0x00041325":
    meaning: サービスがタスクに実行を要求した（キュー済み）状態。失敗ではない。
    next: 対応不要。

  "0x80041309":
    meaning: トリガーが見つからない。
    cause: タスク定義からトリガーが削除された、または参照が壊れている可能性。
    next: タスク定義のトリガーを確認再設定する。

  "0x8004130A":
    meaning: 実行に必要なプロパティが未設定。
    cause: 操作（Action）やプリンシパルなど、実行に必須の項目が欠けている可能性。
    next: 操作プリンシパル等、必須項目の欠落を確認する。

  "0x8004130C":
    meaning: このコンピューターに Task Scheduler サービスがインストールされていない。
    cause: システム構成の異常。通常の Windows では発生しない。
    next: システムの状態を確認（通常は環境側の異常）。

  "0x8004130D":
    meaning: タスクオブジェクトを開けない。
    cause: 権限不足か、タスク定義ファイルの破損の可能性。
    next: 権限、またはタスク定義の破損を確認する。

  "0x8004130E":
    meaning: 無効なタスクオブジェクト、またはタスクオブジェクトではない。
    cause: 指定した対象がタスクではない、または定義が壊れている可能性。
    next: 対象の指定が正しいか確認する。

  "0x8004130F":
    meaning: セキュリティ データベースに、このタスクの実行アカウント情報が見つからない。資格情報未設定。
    cause: |
      「ログオンの有無に関わらず実行」なのにパスワードが保存されていない、
      またはパスワード変更後に資格情報が更新されていない可能性。
    next: |
      実行ユーザーと資格情報を設定し直して再登録する（パスワード入力が必要）:
        Register-ScheduledTask ... -User "<USER>" -Password "<...>"   # 対話入力推奨
      切り分け: {{snippets.isolate_security_context}}

  "0x80041310":
    meaning: 指定されたアカウントの存在を確認できない。
    cause: |
      実行ユーザー名の綴り誤り、ドメインへの到達不可、
      またはアカウントが削除/改名された可能性。
    next: 実行ユーザー名（ドメイン\\ユーザー形式）が正しいか確認する。

  "0x80041314":
    meaning: アカウント設定と実行時オプションの組み合わせがサポートされていない。
    cause: |
      「ログオンの有無に関わらず実行」と、選択中のログオンタイプや
      「最上位の特権で実行」等の組み合わせが両立していない可能性。
    next: |
      「ログオンの有無に関わらず実行」と選択中のログオンタイプ/権限の
      組み合わせを見直す。{{snippets.isolate_security_context}}

  "0x80041315":
    meaning: Task Scheduler サービスが実行されていない。
    cause: サービスが停止または無効化されている可能性。
    next: |
      サービス状態を確認:
        Get-Service Schedule
      （通常は自動起動。停止していれば環境側の異常を調査）

  "0x80041316":
    meaning: タスク XML に予期しないノードが含まれる。
    cause: タスク定義の破損、または手書き/生成した XML のスキーマ不一致の可能性。
    next: タスク XML を再エクスポートし、破損箇所を確認して再登録する。

  "0x80041317":
    meaning: タスク XML に予期しない名前空間の要素/属性がある。
    cause: XML の名前空間宣言が誤っている可能性（既定は .../mit/task）。
    next: タスク XML の名前空間を確認する。

  "0x80041318":
    meaning: タスク XML の値が不正な書式、または範囲外。
    cause: 時刻境界期間などの書式誤り、または許容範囲外の値の可能性。
    next: 該当値（時刻境界期間など）の書式を確認する。

  "0x80041319":
    meaning: タスク XML に必須の要素/属性が欠けている。
    cause: 手書き/生成した XML で必須要素が抜けている可能性。
    next: 欠落要素を補って再登録する。

  "0x8004131A":
    meaning: タスク XML が不正な形式。
    cause: XML として構文が壊れている（タグの不整合、エンコーディング誤りなど）可能性。
    next: XML を再エクスポートして構文を確認する。

  "0x8004131E":
    meaning: トリガーの終了境界を過ぎているため開始できない。
    cause: トリガーの終了日時が過去になっている。意図的な期限設定の可能性もある。
    next: トリガーの終了日時を延長するか、意図通りか確認する。

  "0x8004131F":
    meaning: このタスクのインスタンスが既に実行中。
    cause: |
      前回の実行が終了していない可能性。多重起動ポリシーが
      「新しいインスタンスは開始しない」だと、この結果になる。
    next: |
      前回の実行が終了していない可能性。多重起動時のポリシーと、
      残存プロセスを確認する。

  "0x80041320":
    meaning: 対象ユーザーがログオンしていないため実行されない。
    cause: 「ユーザーがログオンしているときのみ実行」設定で、実行時刻にログオンしていなかった可能性。
    next: |
      「ユーザーがログオンしているときのみ実行」設定の副作用。
      ログオフ中も動かしたいなら「ログオンの有無に関わらず実行」に変更
      （資格情報の入力が必要）。意図通りなら対応不要。

  "0x80041321":
    meaning: タスクイメージが破損、または改ざんされている。
    cause: タスク定義の整合性ハッシュが一致しない。ファイル破損か、直接編集された可能性。
    next: タスクを削除して再登録する（改ざんの疑いがあれば経緯も確認）。

  "0x80041322":
    meaning: Task Scheduler サービスが利用できない。
    cause: サービスの停止中、またはシャットダウン処理中の可能性。
    next: サービス状態（Get-Service Schedule）と環境の異常を確認する。

  "0x80041323":
    meaning: サービスが混雑して要求を処理できない。時間をおいて再試行。
    cause: 同時に大量のタスクが要求された等、一時的な負荷の可能性。
    next: 一時的な負荷。しばらく待って再実行する。

  "0x80041324":
    meaning: サービスは実行を試みたが、タスク定義の制約により実行されなかった。
    cause: |
      「AC電源時のみ開始」「アイドル時のみ」「ネットワーク接続時のみ」等の
      条件が満たされず、ブロックされた可能性。
    next: |
      条件（電源/アイドル/ネットワーク）でブロックされた可能性。
      「AC電源時のみ」「アイドル時のみ」等の条件を確認する。

  "0x00001838":
    meaning: Task Scheduler サービスは System アカウントで実行される必要がある（個々のタスクは別アカウント可）。
    cause: サービス自体のログオンアカウントが SYSTEM 以外に変更されている可能性。
    next: サービスのログオンアカウントが SYSTEM か確認する。

  "0x00000001":
    meaning: |
      「Incorrect function」。多くの場合、実行されたプログラム自身が
      終了コード 1 を返している（＝タスクスケジューラではなくアプリ側の失敗）。
    cause: |
      スクリプト/プログラム内部でのエラー（例外、引数不正、依存先の不在など）。
      タスクスケジューラは起動に成功しており、失敗はアプリ側にある可能性が高い。
    next: |
      操作のコマンドをタスクを介さず直接実行して、アプリ側のエラーを確認:
        {{snippets.test_action_standalone}}
      PowerShell なら transcript を有効化して詳細を採る。

  "0x00000002":
    meaning: |
      多くの場合 ERROR_FILE_NOT_FOUND（実行しようとしたファイルが見つからない）という
      Windows システムエラーです。ただし LastTaskResult はプログラムの終了コードも
      そのまま返すため、プログラムが独自に 2 を返した可能性も残ります。
    cause: |
      操作のパスが存在しない、またはタスク実行時の文脈（別ユーザー
      マップドライブ）から解決できない。
      あるいは、起動したプログラム自身が終了コード 2 を返している。
    next: |
      まずパスがタスクの実行ユーザー文脈で解決できるか確認する。
      共有(UNC)上の .exe は、実行アカウントのみ権限がある場合に失敗しやすい。
      回避策(公式): 直接指定でなく cmd 経由にする
        cmd /c \\server\share\app.exe
      またはクライアント(実行アカウント)に共有アクセス権を付与する。
      パスに問題が無ければ、プログラム側が 2 を返していないか直接実行して確かめる:
        {{snippets.test_action_standalone}}

  "0x80070005":
    meaning: アクセス拒否。実行アカウントの権限、または対象リソースの権限不足。
    cause: |
      実行ユーザーに必要な権限が無い、タスクフォルダの ACL が変更されている、
      または対象ファイル/共有へのアクセス権が無い可能性。
    next: |
      次を確認（公式トラブルシューティングより）:
        - 実行ユーザーに必要な権限（管理者権限が要るタスクか）
        - C:\Windows\System32\Tasks フォルダの権限が変更されていないか
        - タスクが現在のユーザーと異なる資格情報で構成されていないか

# 検出ルール (data/rules.yaml) のプロース。キー集合は rules.yaml の id と一致させる。
# 誤検知への規律: ヒューリスティックの next は「調査」の文体（〜を確認する）で書き、断定しない。
rules:
  task_disabled:
    meaning: このタスクは無効化されています。スケジュール時刻が来ても実行されません。
    next: |
      無効化が意図通りか確認してください。動かしたいなら:
        Enable-ScheduledTask {{task_args}}

  no_triggers:
    meaning: トリガーが1つもありません。手動でしか実行されません。
    cause: 登録時にトリガーを付け忘れたか、意図的に手動専用にしている可能性。
    next: |
      手動専用の運用でないなら、トリガーを追加してください。現状の定義は:
        Export-ScheduledTask {{task_args}}

  all_triggers_disabled:
    meaning: トリガーはありますが、すべて無効です。自動では起動しません。
    cause: 一時的に止めた際の戻し忘れの可能性。
    next: |
      トリガーの有効/無効が意図通りか確認する:
        (Get-ScheduledTask {{task_args}}).Triggers

  past_end_boundary:
    meaning: すべてのトリガーが終了境界（有効期限）を過ぎています。今後は自動実行されません。
    cause: 期限付きで登録されたタスクの期限切れ。意図的な可能性もあります。
    next: 期限切れが意図通りか確認してください。続けるなら終了境界を延長します。

  no_next_run:
    meaning: 有効なトリガーがあるのに、次回実行時刻が設定されていません。
    cause: トリガー条件が今後成立しない（曜日・日付の組み合わせ等）可能性。
    next: |
      トリガーの条件を確認する:
        (Get-ScheduledTask {{task_args}}).Triggers
        Get-ScheduledTaskInfo {{task_args}}

  never_run:
    meaning: このタスクは一度も実行されていません。
    cause: 登録直後か、トリガー条件がまだ成立していない可能性。
    next: 登録直後なら正常です。実行されるはずの時刻を過ぎているなら、トリガーと条件を確認してください。

  stale_last_run:
    meaning: 最後の実行から {{days}} 日が経過しています。
    cause: トリガー条件が成立しなくなったか、タスクが止められたままの可能性。
    next: |
      この間隔が想定通りか確認してください。想定外なら履歴を確認する:
        {{snippets.operational_log}}

  relative_command_without_workdir:
    meaning: 操作のパスが相対パスで、作業ディレクトリも未設定です。
    cause: |
      タスク実行時の作業ディレクトリは通常 C:\Windows\System32 になるため、
      相対パスは登録時と別の場所を指して失敗しやすい設定です。
    next: |
      対象: {{command}}
      操作のパスを絶対パスにするか、「開始(オプション)」に作業ディレクトリを設定してください。
      切り分け: {{snippets.test_action_standalone}}

  command_not_found:
    meaning: 操作の実行ファイルが、taskctl の実行文脈からは見つかりません。
    cause: |
      パスの誤りの可能性。ただし taskctl が動く文脈と、タスクが実際に走る文脈
      （別ユーザー権限）は異なるため、そちらでは見える可能性も残ります。
    next: |
      対象: {{command}}
      パスの綴りを確認し、タスクの実行ユーザーの文脈で解決できるか確認してください。
      切り分け: {{snippets.test_action_standalone}}

  working_directory_not_found:
    meaning: 作業ディレクトリが、taskctl の実行文脈からは見つかりません。
    cause: パスの誤りか、タスク実行文脈でのみ見えるパスの可能性。
    next: |
      対象: {{workdir}}
      「開始(オプション)」のパスを確認してください。

  mapped_drive_dependency:
    meaning: 操作がマップドライブ（ネットワークドライブの割り当て文字）を参照しています。
    cause: |
      ドライブ文字の割り当てはログオンセッションごとです。タスク実行時
      （別ユーザー非対話）にはマウントされておらず、解決できない可能性が高い設定です。
    next: |
      対象: {{command}}
      UNC パス (\\server\share\...) へ置き換えることを検討してください。
      共有(UNC)上の実行は cmd 経由が有効（公式回避策）:
        cmd /c \\server\share\script.cmd

  unc_path_exec:
    meaning: 操作が共有 (UNC) 上のプログラム/スクリプトを直接実行します。
    cause: 実行アカウントに共有へのアクセス権が無いと失敗します（ERROR_FILE_NOT_FOUND になりがち）。
    next: |
      失敗する場合は cmd 経由の起動が有効（公式回避策）:
        cmd /c \\server\share\app.exe
      または実行アカウントに共有アクセス権を付与してください。

  profile_dependency_as_service:
    meaning: サービスアカウント (SYSTEM 等) で実行されるのに、ユーザープロファイル依存の環境変数を使っています。
    cause: |
      %USERPROFILE% や %APPDATA% はサービスアカウントでは別の場所
      (C:\Windows\System32\config\systemprofile\...) を指します。
    next: |
      対象: {{command}}
      プロファイル依存の変数を絶対パスへ置き換えるか、実行ユーザーを見直してください。

  powershell_script_without_file:
    meaning: PowerShell を起動していますが、-File / -Command の指定が見当たりません。
    cause: 引数の指定漏れ。対話シェルが起動するだけで、何も実行されない可能性。
    next: |
      対象: {{command}}
      スクリプトを実行するなら -File を付けてください:
        powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\path\to\script.ps1"

  script_as_command:
    meaning: スクリプトファイルを「プログラム」として直接指定しています。
    cause: |
      .ps1 は既定ではメモ帳等に関連付けられており、直接起動では実行されません
      （タスクは成功に見えるのに何も起きない、になりがち）。
    next: |
      対象: {{command}}
      ホストプログラム経由で起動してください:
        powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\path\to\script.ps1"

  run_only_if_logged_on:
    meaning: 「ユーザーがログオンしているときのみ実行」の設定です。
    next: |
      ログオフ中に実行されないのは仕様です。意図通りですか？
      ログオフ中も動かすなら「ログオンの有無に関わらず実行」へ変更します（資格情報が必要）。

  ac_power_only:
    meaning: 「AC 電源接続時のみ開始」の設定です。バッテリー駆動中は実行されません。
    next: |
      ノート PC で実行されないことがあるのは仕様です。意図通りですか？
      バッテリーでも動かすなら「電源」の条件を外します。

  idle_only:
    meaning: 「アイドル時のみ実行」の設定です。PC 使用中は実行されません。
    next: |
      アイドルにならない環境では長く実行されないことがあります。意図通りですか？

  network_only:
    meaning: 「ネットワーク接続時のみ実行」の設定です。
    next: |
      オフライン時に実行されないのは仕様です。意図通りですか？

  short_execution_time_limit:
    meaning: "実行時間の制限が {{limit_seconds}} 秒と短めです。超過すると強制終了されます（結果: SCHED_S_TASK_TERMINATED）。"
    next: |
      処理がこの時間内に終わる想定か確認してください。足りないなら
      「設定 > 停止するまでの時間」を延長します。

  multiple_instances_parallel:
    meaning: 多重起動が「並列で実行」に設定されています。前回の実行が残っていても重ねて起動します。
    next: |
      同時実行してよい処理か確認してください（ファイルロックDB 競合の原因になりがち）。

fallback:
  hresult_from_win32:
    meaning: |
      このコードは Windows の Win32 エラーを HRESULT で包んだものです（0x8007xxxx）。
      下位16bit が Win32 エラーコードにあたります。
    cause: 汎用の Windows エラーのため、原因はこのコードだけでは断定できません。
    next: |
      このコードの Win32 エラー番号は {{win32}} です。意味は次で確認できます:
        net helpmsg {{win32}}
      （例: 0x80070002 なら win32=2 で「指定されたファイルが見つかりません」）
  unknown:
    meaning: |
      翻訳表に無い結果コードです。意味は断定できませんが、0 以外なので
      失敗として扱います。プログラム独自の終了コードの可能性があります。
    cause: このコードだけでは断定できません。実行しているプログラムの仕様によります。
    next: |
      操作のコマンドを直接実行し、プログラム自身のドキュメントやログで
      この終了コードの意味を確認する:
        {{snippets.test_action_standalone}}
      タスクスケジューラ側の記録も確認する:
        {{snippets.operational_log}}
